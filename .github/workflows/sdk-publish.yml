name: Publish SDK to npm

# Publishes @displayxr/inline3d to npm from CI via TRUSTED PUBLISHING (OIDC) — no
# npm token exists anywhere (no repo secret, nothing on any dev box). npm links the
# package to this repo + workflow; CI authenticates per-run with a short-lived OIDC
# token. Once a Trusted Publisher is configured on npm for the package, a release is:
#     git tag sdk-vX.Y.Z && git push origin sdk-vX.Y.Z
# The tag version MUST match package.json "version" (checked below).
#
# One-time bootstrap (a trusted publisher attaches per-package, so the package must
# exist first): publish a 0.0.1 stub manually, configure the Trusted Publisher in the
# npm UI, then CI publishes the real version with provenance. See docs/publishing.md.
#
# workflow_dispatch with dry_run=true does everything except the upload — use it to
# validate OIDC + package before the first real tag.

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack + typecheck but do NOT publish"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # npm provenance (public repo)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Typecheck public API
        run: |
          npm install --no-save typescript@^5.4.0 @types/webxr@^0.5.0
          npx tsc --noEmit -p tsconfig.json

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VER="$(node -p "require('./package.json').version")"
          TAG_VER="${GITHUB_REF_NAME#sdk-v}"
          echo "package.json=$PKG_VER  tag=$TAG_VER"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::tag sdk-v$TAG_VER does not match package.json version $PKG_VER"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: authentication is per-run OIDC (trusted publishing).
      # Requires a Trusted Publisher configured on npm for this package, pointing at
      # DisplayXR/displayxr-web + this workflow file. --provenance is implied by
      # trusted publishing but kept explicit.
      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --provenance --access public --dry-run

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm publish --provenance --access public
